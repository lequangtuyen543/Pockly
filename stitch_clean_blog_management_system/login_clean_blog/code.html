<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "surface-bright": "#fcf9f8",
                        "surface": "#fcf9f8",
                        "on-primary-fixed": "#001c3a",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb688",
                        "on-surface": "#1c1b1b",
                        "on-secondary-container": "#287100",
                        "on-error-container": "#93000a",
                        "secondary-container": "#85fa51",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#934600",
                        "on-surface-variant": "#404753",
                        "surface-container-high": "#ebe7e7",
                        "on-tertiary-container": "#fffbff",
                        "on-tertiary-fixed": "#311300",
                        "secondary-fixed-dim": "#6de039",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f3f0ef",
                        "surface-tint": "#005fae",
                        "on-secondary-fixed": "#062100",
                        "surface-container": "#f0edec",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "secondary": "#266d00",
                        "background": "#fcf9f8",
                        "surface-variant": "#e5e2e1",
                        "outline": "#707785",
                        "primary-container": "#0075d5",
                        "on-background": "#1c1b1b",
                        "surface-container-low": "#f6f3f2",
                        "on-tertiary-fixed-variant": "#733600",
                        "surface-dim": "#dcd9d9",

                        "inverse-primary": "#a5c8ff",
                        "outline-variant": "#c0c7d6",
                        "on-primary-fixed-variant": "#004785",
                        "primary": "#005daa",
                        "primary-fixed-dim": "#a5c8ff",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#1a5200",
                        "surface-container-highest": "#e5e2e1",
                        "primary-fixed": "#d4e3ff",
                        "inverse-surface": "#313030"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-page": "32px",
                        "gutter": "24px",
                        "sidebar-width": "256px",
                        "container-max-width": "1200px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "h2": ["Inter"],
                        "h3": ["Inter"],
                        "body-sm": ["Inter"],
                        "code": ["monospace"],
                        "h1": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "h2": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "h3": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "code": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "h1": ["38px", {"lineHeight": "46px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ant-input-focus:focus-within {
            border-color: #005daa;
            box-shadow: 0 0 0 2px rgba(0, 93, 170, 0.1);
        }
    </style>
</head>
<body class="bg-[#f0f2f5] font-body-md text-on-surface antialiased">
<!-- The Shell is suppressed for the Login flow as per the "Linear/Transactional" rule. -->
<div class="min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[400px]">
<!-- Brand Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-12 h-12 bg-primary rounded-lg mb-4">
<span class="material-symbols-outlined text-on-primary text-2xl" data-icon="article">article</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface tracking-tight">Clean Blog</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Sign in to manage your content</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-10 rounded-lg shadow-sm">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
<div class="relative ant-input-focus group border border-outline-variant rounded transition-all duration-200">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-2 bg-transparent border-none focus:ring-0 font-body-sm text-body-sm placeholder:text-outline/50" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative ant-input-focus group border border-outline-variant rounded transition-all duration-200">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-4 py-2 bg-transparent border-none focus:ring-0 font-body-sm text-body-sm placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Options -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary/20 transition-all cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-2 font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember Me</label>
</div>
<!-- Submit -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-body-md text-body-md py-2.5 rounded shadow-sm transition-all duration-200 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary/30" type="submit">
                        Login
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container-lowest px-2 text-outline">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center px-4 py-2 border border-outline-variant rounded hover:bg-surface-container transition-colors">
<img alt="Google" class="w-4 h-4 mr-2" data-alt="Google company logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrH99Bw8qhJBW3zC1AfonmBJ2wV5e-iufeilsTAGIguT5s27w2XNQGnayiIVZDSII_5pCK2NBNzr7ic8EwgxXFD6ksyG0i243H0lCigeNVNvBBi-79Dsh4wXd-m23lTgjKRumpEPXEhueDoZIxUgU93q73cHN_Xwvk1bNjbvf4US1gcPymbx01XuMis8kj1oJPL-OOySELLPlGaOHka2jU4aZFSsCjfpSbgM0RJ9B7CuzK9h1y0Jye6adyYnF0m4OyI1yibp3Rxjs"/>
<span class="font-body-sm text-body-sm">Google</span>
</button>
<button class="flex items-center justify-center px-4 py-2 border border-outline-variant rounded hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px] mr-2" data-icon="terminal">terminal</span>
<span class="font-body-sm text-body-sm">Github</span>
</button>
</div>
</div>
<!-- Footer Link -->
<p class="text-center mt-8 font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline" href="#">Register now</a>
</p>
</div>
</div>
<!-- Minimal Footer as per JSON, but styled for centered layout -->
<footer class="fixed bottom-0 left-0 w-full py-8 text-center opacity-60">
<p class="font-body-sm text-body-sm text-on-surface-variant">
            © 2024 Clean Blog Management System. Built for efficiency.
        </p>
<div class="mt-2 flex justify-center gap-4">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary" href="#">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary" href="#">Terms of Service</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary" href="#">Help Center</a>
</div>
</footer>
</body></html>
